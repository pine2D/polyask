<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title data-i18n="con_groupAria">Select sites</title>
<script src="../i18n.js"></script>
<script src="theme.js"></script>
<link rel="icon" href="../icons/icon32.png">
<link rel="stylesheet" href="console.css"></head>
<body class="scope">
  <header id="scope-head"><strong data-i18n="con_groupAria">选择站点</strong><span id="scope-count"></span></header>
  <div id="scope-quick"><button id="scope-all" type="button" data-i18n="con_grpAll">全部</button><button id="scope-none" type="button" data-i18n="con_grpNone">清空</button><span id="scope-groups"></span></div>
  <div id="scope-sites" role="group" data-i18n-aria="con_grpSites" aria-label="切换单站"></div>
  <div id="scope-tools" class="scope-foot"><button id="scope-checkup" type="button" data-i18n="con_moreCheckup">巡检所选站点</button><span id="scope-live" role="status" aria-live="polite"></span></div>
  <div id="scope-manage" class="scope-foot"><button id="grp-save" type="button" data-i18n="con_moreGrpSave">保存当前选择为分组…</button><button id="grp-del" type="button" data-i18n="con_moreGrpDel" disabled>删除匹配当前选择的分组…</button></div>
  <div id="scope-name" class="scope-foot" hidden><input id="group-name" type="text" data-i18n-ph="con_grpNamePh" data-i18n-aria="con_grpNamePh" placeholder="分组名称（回车保存）"><button id="group-name-cancel" type="button" data-i18n="con_cancel">取消</button></div>
  <div id="scope-confirm" class="scope-foot" hidden><span id="scope-confirm-text"></span><button id="scope-confirm-yes" type="button" data-i18n="con_delete">删除</button><button id="scope-confirm-no" type="button" data-i18n="con_cancel">取消</button></div>
  <script src="sites.js"></script>
  <script src="scope.js"></script>
</body></html>
