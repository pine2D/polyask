<!doctype html>
<html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="console.css"></head>
<body>
  <div id="bar">
    <div id="sites"></div>
    <select id="tier" title="发送前档位">
      <option value="">档位：不变</option>
      <option value="think">🧠 深度思考</option>
      <option value="fast">⚡ 快速</option>
    </select>
    <input id="prompt" type="text" placeholder="输入要群发的问题…">
    <button id="tile">开启并平铺</button>
    <button id="send">发送到全部</button>
    <button id="newsession" class="icon" title="全部新会话（各窗重载到新会话）">🆕</button>
    <button id="focusall" class="icon" title="全部恢复并置顶">⬆</button>
    <button id="minall" class="icon" title="全部最小化">⬇</button>
    <button id="closeall" class="icon" title="关闭控制台开启的全部窗口">✕</button>
  </div>
  <script src="console.js"></script>
</body></html>
