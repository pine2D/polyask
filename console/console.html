<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<script src="../i18n.js"></script>
<script src="theme.js"></script>
<link rel="stylesheet" href="console.css"></head>
<body>
  <div id="bar">
    <div class="brand"><span class="logo">◈</span>PolyAsk</div>
    <div class="grpwrap">
      <select id="group" data-i18n-title="con_groupTitle" data-i18n-aria="con_groupAria" title="分组：预设 + 自定义" aria-label="站点分组"><option value="" data-i18n="con_groupPh">分组▾</option></select>
      <button id="grp-save" class="mini" data-i18n-title="con_grpSaveTitle" data-i18n-aria="con_grpSaveTitle" title="把当前勾选存为分组" aria-label="保存分组">＋</button>
      <button id="grp-del" class="mini" data-i18n-title="con_grpDelTitle" data-i18n-aria="con_grpDelTitle" title="删除选中的自定义分组" aria-label="删除分组" disabled>✕</button>
    </div>
    <div id="siteswrap">
      <span id="sites-l" class="sarr" aria-hidden="true"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg></span>
      <div id="sites"></div>
      <span id="sites-r" class="sarr" aria-hidden="true"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5"/></svg></span>
    </div>
    <select id="tier" data-i18n-title="con_tierTitle" title="发送前档位">
      <option value="" data-i18n="con_tierKeep">档位：不变</option>
      <option value="think" data-i18n="con_tierThink">🧠 深度思考</option>
      <option value="fast" data-i18n="con_tierFast">⚡ 快速</option>
    </select>
    <div class="tplwrap">
      <select id="tpl" data-i18n-title="con_tplTitle" title="提示词模板"><option value="" data-i18n="con_tplPh">模板▾</option></select>
      <button id="tpl-save" class="mini" data-i18n-title="con_tplSaveTitle" title="保存当前输入为模板">＋</button>
      <button id="tpl-del" class="mini" data-i18n-title="con_tplDelTitle" title="删除选中模板">✕</button>
    </div>
    <input id="nameinput" type="text" style="display:none" data-i18n-aria="con_nameAria" aria-label="名称（模板/分组）">
    <span id="confirmbar" style="display:none"><span id="confirmtext"></span><button id="confirm-yes" data-i18n="con_delete">删除</button><button id="confirm-no" data-i18n="con_cancel">取消</button></span>
    <input id="prompt" type="text" data-i18n-ph="con_promptPh" placeholder="输入要群发的问题…（Enter 发送 · ↑↓ 历史）">
    <button id="compose" class="icon" data-i18n-title="con_composeTitle" data-i18n-aria="con_composeTitle" title="展开编辑长文本" aria-label="展开编辑长文本"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2.5l2.5 2.5M3 13l.8-3L11 2.8 13.2 5 6 12.2 3 13z"/></svg></button>
    <button id="send" data-i18n="con_sendAll">发送到全部 ▸</button>
    <button id="retry" class="icon" data-i18n-title="con_retryTitle" data-i18n-aria="con_retryTitle" title="重试失败的站点" aria-label="重试失败的站点" disabled><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9M13.5 2.5V6h-3.5"/></svg></button>
    <span id="failsum" style="display:none"></span>
    <button id="tile" data-i18n="con_tile" data-i18n-title="con_tileTitle" title="只开窗与重排布局，不发送">平铺</button>
    <button id="checkup" class="icon" data-i18n-title="con_checkupTitle" data-i18n-aria="con_checkupTitle" title="巡检所选站点适配是否失效（只读诊断）" aria-label="巡检站点"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 8h3l2-4.5 3 9 2-4.5h3"/></svg></button>
    <button id="newsession" class="icon" data-i18n-title="con_newSessionTitle" data-i18n-aria="con_newSessionTitle" title="全部新会话（各窗重载到新会话）" aria-label="全部新会话"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3.5v9M3.5 8h9"/></svg></button>
    <button id="closeall" class="icon" data-i18n-title="con_closeAllTitle" data-i18n-aria="con_closeAllTitle" title="关闭控制台开启的全部窗口" aria-label="关闭全部"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg></button>
  </div>
  <span id="live" class="sr" aria-live="polite"></span>
  <script src="sites.js"></script>
  <script src="console.js"></script>
  <script src="status.js"></script>
  <script src="manage.js"></script>
</body></html>
