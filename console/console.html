<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title data-i18n="pop_openConsole">PolyAsk</title>
<script src="../i18n.js"></script>
<script src="theme.js"></script>
<link rel="icon" href="../icons/icon32.png">
<link rel="stylesheet" href="console.css"></head>
<body>
  <div id="bar">
    <div class="brand"><svg class="logo" viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><path d="M8 1.5 14.5 8 8 14.5 1.5 8z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M8 5.4 10.6 8 8 10.6 5.4 8z" fill="currentColor"/></svg>PolyAsk</div>
    <button id="group" type="button" data-i18n-title="con_groupTitle" data-i18n-aria="con_groupAria" title="选择站点范围" aria-label="选择站点范围" aria-haspopup="dialog"><span id="group-count">已选 0/9</span><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m4 6 4 4 4-4"/></svg></button>
    <div id="siteswrap">
      <button id="sites-l" class="sarr" type="button" data-i18n-aria="con_scrollSitesLeft" aria-label="向左滚动站点" aria-hidden="true" disabled><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 3L5 8l5 5"/></svg></button>
      <div id="sites"></div>
      <button id="sites-r" class="sarr" type="button" data-i18n-aria="con_scrollSitesRight" aria-label="向右滚动站点" aria-hidden="true" disabled><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3l5 5-5 5"/></svg></button>
    </div>
    <div id="tierbuttons" role="group" data-i18n-aria="con_tierTitle" aria-label="发送前档位">
      <button type="button" data-tier="" aria-pressed="true"><span data-i18n="con_tierKeepShort">保持</span></button>
      <button type="button" data-tier="think" aria-pressed="false"><span data-i18n="con_tierThinkShort">深思</span></button>
      <button type="button" data-tier="fast" aria-pressed="false"><span data-i18n="con_tierFastShort">快速</span></button>
    </div>
    <select id="tier" hidden aria-hidden="true">
      <option value="" data-i18n="con_tierKeep">档位：不变</option>
      <option value="think" data-i18n="con_tierThink">🧠 深度思考</option>
      <option value="fast" data-i18n="con_tierFast">⚡ 快速</option>
    </select>
    <input id="prompt" type="text" data-i18n-ph="con_promptPh" data-i18n-aria="con_promptAria" placeholder="输入要群发的问题…（Enter 发送 · ↑↓ 历史）" aria-label="群发问题" aria-keyshortcuts="Alt+P">
    <button id="image" type="button" class="icon" data-i18n-title="con_imageAdd" data-i18n-aria="con_imageAdd" title="添加图片" aria-label="添加图片" aria-pressed="false"><svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2.5" width="12" height="11" rx="2"/><circle cx="5.5" cy="6" r="1"/><path d="m3.5 12 3-3 2 2L10 9.5l2.5 2.5"/></svg></button>
    <input id="image-input" type="file" accept="image/png,image/jpeg" hidden>
    <button id="compose" class="icon" data-i18n-title="con_composeTitle" data-i18n-aria="con_composeTitle" title="展开编辑长文本" aria-label="展开编辑长文本"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2.5l2.5 2.5M3 13l.8-3L11 2.8 13.2 5 6 12.2 3 13z"/></svg></button>
    <button id="send" data-i18n="con_sendAll">发送 ▸</button>
    <span id="failsum" style="display:none"></span>
    <button id="retry" class="icon" data-i18n-title="con_retryTitle" data-i18n-aria="con_retryTitle" title="重试失败的站点 · Alt+R" aria-label="重试失败的站点" aria-keyshortcuts="Alt+R" disabled><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9M13.5 2.5V6h-3.5"/></svg></button>
    <span class="vsep" aria-hidden="true"></span>
    <button id="tile" class="icon" data-i18n-title="con_tileTitle" data-i18n-aria="con_tileTitle" title="只开窗与重排布局，不发送 · Alt+L" aria-label="平铺所选站点" aria-keyshortcuts="Alt+L"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="2.5" y="3" width="4.5" height="10" rx="1"/><rect x="9" y="3" width="4.5" height="10" rx="1"/></svg></button>
    <button id="collect" class="icon" data-i18n-title="con_collectTitle" data-i18n-aria="con_collectTitle" title="汇总复制：把所选站点的最新回答拼成 Markdown 复制 · Alt+C" aria-label="汇总复制回答" aria-keyshortcuts="Alt+C"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/><path d="M10.5 3.5v-1h-8v8h1"/></svg></button>
    <button id="newsession" class="icon" data-i18n-title="con_newSessionTitle" data-i18n-aria="con_newSessionTitle" title="为所选站点开启新会话（重载各窗口）· Alt+N" aria-label="所选站点开启新会话" aria-keyshortcuts="Alt+N"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3.5v9M3.5 8h9"/></svg></button>
    <button id="archive" class="icon" data-i18n-title="con_archiveTitle" data-i18n-aria="con_archiveTitle" title="查看历史归档" aria-label="查看历史归档"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="3" width="11" height="3" rx="1"/><path d="M3.5 6v6a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V6M6.5 9.5h3"/></svg></button>
    <button id="closeall" class="icon" data-i18n-title="con_closeAllTitle" data-i18n-aria="con_closeAllTitle" title="关闭控制台开启的全部窗口" aria-label="关闭全部"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg></button>
  </div>
  <span id="live" class="sr" aria-live="polite"></span>
  <script src="sites.js"></script>
  <script src="library.js"></script>
  <script src="console.js"></script>
  <script src="status.js"></script>
</body></html>
