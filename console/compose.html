<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title data-i18n="cmp_title">PolyAsk</title>
<script src="../i18n.js"></script>
<script src="theme.js"></script>
<link rel="icon" href="../icons/icon32.png">
<link rel="stylesheet" href="console.css"></head>
<body class="compose">
  <div id="ch-head">
    <div class="t"><svg class="logo" viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2.5l2.5 2.5M3 13l.8-3L11 2.8 13.2 5 6 12.2 3 13z"/></svg> <span data-i18n="cmp_title">编辑群发问题</span></div>
    <button id="ch-close" class="icon" data-i18n-title="cmp_close" data-i18n-aria="cmp_close" title="关闭" aria-label="关闭"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg></button>
  </div>
  <textarea id="ch-text" data-i18n-ph="cmp_ph" placeholder="输入要群发的问题…（Ctrl+Enter 发送）"></textarea>
  <div id="ch-foot">
    <span id="ch-scope" class="scope"></span>
    <button id="ch-back" data-i18n="cmp_back">回填并关闭</button>
    <button id="ch-send" data-i18n="cmp_send">发送到全部 ▸</button>
  </div>
  <script src="sites.js"></script>
  <script src="compose.js"></script>
</body></html>
