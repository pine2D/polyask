<!doctype html>
<html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="console.css"></head>
<body class="compose">
  <div id="ch-head">
    <div class="t"><svg class="logo" viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2.5l2.5 2.5M3 13l.8-3L11 2.8 13.2 5 6 12.2 3 13z"/></svg> 编辑群发问题</div>

  <script src="compose.js"></script>
