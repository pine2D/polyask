<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title data-i18n="cmp_title">PolyAsk</title>
<script src="../i18n.js"></script>
<script src="theme.js"></script>
<link rel="icon" href="../icons/icon32.png">
<link rel="stylesheet" href="console.css"></head>
<body class="compose">
  <div id="ch-head">
    <div class="t"><svg class="logo" viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2.5l2.5 2.5M3 13l.8-3L11 2.8 13.2 5 6 12.2 3 13z"/></svg> <span data-i18n="cmp_title">编辑群发问题</span></div>
    <button id="ch-close" class="icon" data-i18n-title="cmp_close" data-i18n-aria="cmp_close" title="关闭" aria-label="关闭"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg></button>
  </div>
  <div id="cmp-main">
    <aside id="cmp-library" data-i18n-aria="cmp_libraryAria" aria-label="提示词素材">
      <div id="cmp-tabs" role="tablist">
        <button id="cmp-tab-templates" type="button" role="tab" aria-selected="true" data-kind="templates" data-i18n="cmp_templates">模板</button>
        <button id="cmp-tab-history" type="button" role="tab" aria-selected="false" data-kind="history" data-i18n="cmp_history">历史</button>
      </div>
      <div id="cmp-list" role="listbox" data-i18n-aria="cmp_libraryAria" aria-label="提示词素材"></div>
      <div id="cmp-actions">
        <button id="cmp-save-template" type="button" data-i18n="cmp_saveTemplate">保存为模板…</button>
        <button id="cmp-delete-template" type="button" data-i18n="cmp_deleteTemplate" disabled>删除模板</button>
      </div>
      <div id="cmp-name" hidden>
        <input id="cmp-template-name" type="text" data-i18n-ph="con_tplNamePh" placeholder="模板名称（可留空，回车保存）">
        <button id="cmp-name-save" type="button" data-i18n="cmp_save">保存</button>
        <button id="cmp-name-cancel" type="button" data-i18n="con_cancel">取消</button>
      </div>
      <div id="cmp-confirm" hidden>
        <span id="cmp-confirm-text"></span>
        <button id="cmp-confirm-yes" type="button" data-i18n="con_delete">删除</button>
        <button id="cmp-confirm-no" type="button" data-i18n="con_cancel">取消</button>
      </div>
    </aside>
    <textarea id="ch-text" data-i18n-ph="cmp_ph" placeholder="输入要群发的问题…（Ctrl+Enter 发送）"></textarea>
  </div>
  <div id="ch-foot">
    <span id="ch-scope" class="scope" role="status" aria-live="polite"></span>
    <button id="ch-back" data-i18n="cmp_back">回填并关闭</button>
    <button id="ch-send" data-i18n="cmp_send">发送到全部 ▸</button>
  </div>
  <script src="sites.js"></script>
  <script src="compose.js"></script>
</body></html>
