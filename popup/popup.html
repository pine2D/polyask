<!doctype html>
<html lang="zh">
<head><meta charset="utf-8">
<style>
  body{width:240px;margin:0;padding:12px;font:13px/1.5 -apple-system,"Segoe UI",sans-serif;color:#222}
  .btns{display:flex;gap:8px;margin-bottom:12px}
  .btns button{flex:1;padding:10px 0;border:1px solid #d9d9d9;border-radius:8px;background:#fff;cursor:pointer;font-size:13px}
  .btns button:hover{background:#f5f5f5}
  .btns button.active{border-color:#6366f1;background:#eef2ff}
  fieldset{border:1px solid #e5e5e5;border-radius:8px;margin:0 0 10px;padding:8px 10px}
  legend{font-size:12px;color:#888;padding:0 4px}
  label{display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer}
  .hint{font-size:12px;color:#888}
  .hint a{color:#6366f1;cursor:pointer;text-decoration:none}
  #unsupported{color:#dc2626;font-size:12px;display:none;margin-bottom:8px}
</style></head>
<body>
  <div class="btns">
    <button id="think">🧠 深度思考</button>
    <button id="fast">⚡ 快速模型</button>
  </div>
  <div id="unsupported">当前页面不是受支持的 AI 站点</div>
  <fieldset>
    <legend>悬浮控件显示</legend>
    <label><input type="radio" name="dm" value="handle">贴边把手（悬停展开）</label>
    <label><input type="radio" name="dm" value="always">始终显示</label>
    <label><input type="radio" name="dm" value="hidden">隐藏（仅快捷键）</label>
  </fieldset>
  <fieldset>
    <legend>健康自检</legend>
    <button id="diag" style="width:100%;padding:6px 0;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer">🩺 诊断当前站点</button>
    <div id="diagout" style="font-size:12px;margin-top:6px"></div>
  </fieldset>
  <div class="hint" id="keys"></div>
  <script src="popup.js"></script>
</body></html>
