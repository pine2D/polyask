<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>PolyAsk</title>
<link rel="stylesheet" href="popup.css">
<script src="../console/theme.js"></script>
<script src="../i18n.js"></script>
<script src="../console/sites.js"></script>
</head>
<body>
<main id="app">
  <header class="head">
    <div class="brand"><svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path d="M8 1.5 14.5 8 8 14.5 1.5 8z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M8 5.4 10.6 8 8 10.6 5.4 8z" fill="currentColor"/></svg>PolyAsk</div>
    <div id="site-status" class="status"><i class="status-dot"></i><span id="status-text" data-i18n="pop_detecting">检测中…</span></div>
  </header>
  <button id="open-console"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M8 1.5 14.5 8 8 14.5 1.5 8z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M8 5.4 10.6 8 8 10.6 5.4 8z" fill="currentColor"/></svg><span data-i18n="pop_openConsole">打开群发控制台</span><span class="arrow" aria-hidden="true">›</span></button>
  <div class="modebar">
    <div class="section-label" data-i18n="pop_modeLabel">模型模式</div>
    <div class="segment" role="group" data-i18n-aria="pop_modeLabel" aria-label="模型模式">
      <button id="think" aria-pressed="false"><span data-i18n="pop_thinkShort">深思</span></button>
      <button id="fast" aria-pressed="false"><span data-i18n="pop_fastShort">快速</span></button>
    </div>
  </div>
  <div id="unsupported" data-i18n="pop_unsupported">档位切换需在 AI 站点页使用（群发控制台不受影响）</div>
  <section class="settings">
    <label class="row"><span class="row-icon" aria-hidden="true"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12.5h10M8 12V3M5.5 5.5 8 3l2.5 2.5"/></svg></span><span class="label" data-i18n="pop_autoRaiseShort">发送后自动置顶</span><input class="switch" type="checkbox" id="autoraise"></label>
    <div class="row"><span class="row-icon" aria-hidden="true"><svg viewBox="0 0 16 16" width="14" height="14"><circle cx="8" cy="8" r="5.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 2.5a5.5 5.5 0 0 0 0 11z" fill="currentColor"/></svg></span><span class="label" data-i18n="pop_themeShort">主题</span><div class="mini-segment"><label><input type="radio" name="theme" value="auto"><span data-i18n="pop_themeAutoShort">自动</span></label><label><input type="radio" name="theme" value="light"><span data-i18n="pop_themeLightShort">亮</span></label><label><input type="radio" name="theme" value="dark"><span data-i18n="pop_themeDarkShort">暗</span></label></div></div>
    <div class="row"><span class="row-icon" aria-hidden="true"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="8" cy="8" r="5.5"/><path d="M2.8 8h10.4M8 2.5c1.7 1.7 2.4 3.5 2.4 5.5S9.7 11.8 8 13.5M8 2.5C6.3 4.2 5.6 6 5.6 8s.7 3.8 2.4 5.5"/></svg></span><span class="label" data-i18n="pop_langShort">语言</span><div id="lang" class="select-wrap"><button type="button" class="select-trigger" aria-haspopup="listbox" aria-expanded="false" aria-controls="lang-menu" data-i18n-aria="pop_langShort"><span class="select-value">自动</span></button><div id="lang-menu" class="select-menu" role="listbox" hidden><button type="button" role="option" data-value="auto" data-i18n="pop_langAutoShort">自动</button><button type="button" role="option" data-value="en">English</button><button type="button" role="option" data-value="zh_CN" data-i18n="pop_langZhCNShort">简中</button><button type="button" role="option" data-value="zh_TW" data-i18n="pop_langZhTWShort">繁中</button></div></div></div>
    <div class="row"><span class="row-icon" aria-hidden="true"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="3" width="11" height="10" rx="1.5"/><path d="M10.5 3v10"/></svg></span><span class="label" data-i18n="pop_dmShort">悬浮控件</span><div id="dm" class="select-wrap"><button type="button" class="select-trigger" aria-haspopup="listbox" aria-expanded="false" aria-controls="dm-menu" data-i18n-aria="pop_dmShort"><span class="select-value">贴边</span></button><div id="dm-menu" class="select-menu" role="listbox" hidden><button type="button" role="option" data-value="handle" data-i18n="pop_dmHandleShort">贴边</button><button type="button" role="option" data-value="always" data-i18n="pop_dmAlways">始终显示</button><button type="button" role="option" data-value="hidden" data-i18n="pop_dmHidden">隐藏（仅快捷键）</button></div></div></div>
  </section>
  <div id="keys"></div>
  <section id="console-keys" class="console-keys" aria-labelledby="console-keys-title">
    <div id="console-keys-title" class="shortcut-title" data-i18n="pop_consoleKeys">控制台内快捷键</div>
    <div class="console-key-grid">
      <div class="console-key"><span data-i18n="pop_keyCollect">汇总复制</span><kbd>Alt+C</kbd></div><div class="console-key"><span data-i18n="pop_keyTile">平铺窗口</span><kbd>Alt+L</kbd></div>
      <div class="console-key"><span data-i18n="pop_keyNew">开启新会话</span><kbd>Alt+N</kbd></div><div class="console-key"><span data-i18n="pop_keyPrompt">聚焦输入框</span><kbd>Alt+P</kbd></div>
      <div class="console-key"><span data-i18n="pop_keyRetry">重试失败站点</span><kbd>Alt+R</kbd></div>
    </div>
  </section>
  <div class="tools"><button id="shortcut-help" class="tool"><svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.8" y="3" width="12.4" height="9.5" rx="1.5"/><path d="M4 6h.1M7 6h.1M10 6h.1M4 9h5.5"/></svg><span data-i18n="pop_manageShortcuts">管理快捷键</span></button><button id="diag" class="tool"><svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 8h3l2-4.5 3 9 2-4.5h3"/></svg><span data-i18n="pop_diagShort">诊断</span></button></div>
  <div id="diagout"></div>
</main>
<script src="popup.js"></script>
</body></html>
