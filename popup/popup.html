<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>PolyAsk</title>
<style>
  /* 变量化 + prefers-color-scheme：popup 随系统暗色，不再与暗色控制台/站点形成白色反差 */
  :root{--bg:#fff;--text:#222;--muted:#6b6f7a;--line:#d9d9d9;--line-soft:#e5e5e5;--btn:#fff;--btn-hover:#f5f5f5;--acc:#6366f1;--acc-bg:#eef2ff}
  @media (prefers-color-scheme:dark){:root{--bg:#1b1e28;--text:#e8eaf2;--muted:#9aa0b2;--line:#3a3f4d;--line-soft:#2c3140;--btn:#232734;--btn-hover:#2c3140;--acc:#8b8ff5;--acc-bg:#2a2d4a}}
  body{width:240px;margin:0;padding:12px;font:13px/1.5 -apple-system,"Segoe UI",sans-serif;color:var(--text);background:var(--bg)}
  .btns{display:flex;gap:8px;margin-bottom:12px}
  .btns button{flex:1;padding:10px 0;border:1px solid var(--line);border-radius:9px;background:var(--btn);color:var(--text);cursor:pointer;font-size:13px}
  .btns button:hover{background:var(--btn-hover)}
  .btns button.active{border-color:var(--acc);background:var(--acc-bg)}
  .btns button:disabled{opacity:.45;cursor:default}
  .btns button:disabled:hover{background:var(--btn)}
  /* 按钮图标统一 SVG（emoji 依赖系统字体，无 emoji 字体环境渲染为豆腐块） */
  button svg{vertical-align:-2px;margin-right:5px}
  .btns button svg,#diag svg{color:var(--muted)}
  #open-console svg{color:var(--acc)}
  fieldset{border:1px solid var(--line-soft);border-radius:9px;margin:0 0 10px;padding:8px 10px}
  legend{font-size:12px;color:var(--muted);padding:0 4px}
  label{display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer}
  .hint{font-size:12px;color:var(--muted)}
  .hint .link{all:unset;color:var(--acc);cursor:pointer;text-decoration:none}
  .keyrow{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:2px 0}
  .keyrow span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  kbd{flex:0 0 auto;font:11px ui-monospace,Consolas,monospace;padding:1px 6px;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;background:var(--btn)}
  :focus-visible{outline:2px solid var(--acc);outline-offset:1px}
  /* 非 AI 站点打开 popup 是常态而非错误：中性提示色，不用警告红制造负面情绪 */
  #unsupported{color:var(--muted);font-size:12px;display:none;margin-bottom:8px}
  #open-console{width:100%;padding:8px 0;margin-bottom:10px;border:1px solid var(--acc);border-radius:9px;background:var(--acc-bg);color:var(--text);cursor:pointer}
  #diag{width:100%;padding:6px 0;border:1px solid var(--line);border-radius:9px;background:var(--btn);color:var(--text);cursor:pointer}
  #diagout{font-size:12px;margin-top:6px}
  /* 诊断行状态标记用 SVG 而非字形字符（大字体集下字形回退扫描致卡顿） */
  .ck{display:inline-block;width:9px;height:9px;margin-right:5px;background:center/contain no-repeat}
  .ck.ok{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M2.5 9l4 4 7-10" fill="none" stroke="%2316a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>')}
  .ck.bad{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M3 3l10 10M13 3L3 13" stroke="%23dc2626" stroke-width="3" stroke-linecap="round"/></svg>')}
</style>
<script src="../i18n.js"></script>
</head>
<body>
  <div class="btns">
    <button id="think"><svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M8 1.8 9.7 6.3 14.2 8 9.7 9.7 8 14.2 6.3 9.7 1.8 8 6.3 6.3z"/></svg><span data-i18n="pop_think">深度思考</span></button>
    <button id="fast"><svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M9 1.5 3.5 9h4l-1 5.5L12.5 7h-4l.5-5.5z"/></svg><span data-i18n="pop_fast">快速模型</span></button>
  </div>
  <div id="unsupported" data-i18n="pop_unsupported">档位切换需在 AI 站点页使用（群发控制台不受影响）</div>
  <button id="open-console"><svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><path d="M8 1.5 14.5 8 8 14.5 1.5 8z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M8 5.4 10.6 8 8 10.6 5.4 8z" fill="currentColor"/></svg><span data-i18n="pop_openConsole">打开群发控制台</span></button>
  <fieldset>
    <legend data-i18n="pop_grpLegend">群发</legend>
    <label><input type="checkbox" id="autoraise"><span data-i18n="pop_autoRaise">发送后自动置顶全部窗口</span></label>
  </fieldset>
  <fieldset>
    <legend data-i18n="pop_themeLegend">控制台主题（含群发控制台与编辑窗）</legend>
    <label><input type="radio" name="theme" value="auto"><span data-i18n="pop_themeAuto">随系统</span></label>
    <label><input type="radio" name="theme" value="light"><span data-i18n="pop_themeLight">亮色</span></label>
    <label><input type="radio" name="theme" value="dark"><span data-i18n="pop_themeDark">暗色</span></label>
  </fieldset>
  <fieldset>
    <legend data-i18n="pop_langLegend">语言 / Language</legend>
    <label><input type="radio" name="lang" value="auto"><span data-i18n="pop_langAuto">随系统</span></label>
    <label><input type="radio" name="lang" value="en">English</label>
    <label><input type="radio" name="lang" value="zh_CN">简体中文</label>
    <label><input type="radio" name="lang" value="zh_TW">繁體中文</label>
  </fieldset>
  <fieldset>
    <legend data-i18n="pop_dmLegend">悬浮控件显示</legend>
    <label><input type="radio" name="dm" value="handle"><span data-i18n="pop_dmHandle">贴边把手（悬停展开）</span></label>
    <label><input type="radio" name="dm" value="always"><span data-i18n="pop_dmAlways">始终显示</span></label>
    <label><input type="radio" name="dm" value="hidden"><span data-i18n="pop_dmHidden">隐藏（仅快捷键）</span></label>
  </fieldset>
  <fieldset>
    <legend data-i18n="pop_diagLegend">健康自检</legend>
    <button id="diag"><svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 8h3l2-4.5 3 9 2-4.5h3"/></svg><span data-i18n="pop_diag">诊断当前站点</span></button>
    <div id="diagout"></div>
  </fieldset>
  <div class="hint" id="keys"></div>
  <script src="popup.js"></script>
</body></html>
