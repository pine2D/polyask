name: Release

# 推送 v* 标签即自动打包并发布 GitHub Release。
# 切版本：改 manifest.json 的 version → git tag vX.Y.Z → git push origin vX.Y.Z
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # 创建 Release 需写权限

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # 第三方 Action 固定到 commit SHA：可变 tag 在 contents:write 权限下构成供应链投毒面；升级时人工审 diff 后更新 SHA
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 校验 tag 与 manifest 版本一致
        run: |
          MANIFEST_VER=$(grep -m1 '"version"' manifest.json | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
          TAG_VER="${GITHUB_REF_NAME#v}"
          echo "manifest=$MANIFEST_VER  tag=$TAG_VER"
          [ "$MANIFEST_VER" = "$TAG_VER" ] || { echo "::error::tag $TAG_VER 与 manifest 版本 $MANIFEST_VER 不一致"; exit 1; }

      - name: 打包扩展
        run: bash scripts/package.sh

      # 发布说明 = CHANGELOG.md 中本版段落（分门别类的人写 changelog，不用自动生成的 compare 链接）；
      # 缺本版段落直接拒发——发版前必须先写 changelog。
      - name: 提取本版 changelog
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          awk -v ver="$TAG_VER" '/^## \[/{flag = index($0, "[" ver "]") > 0; next} /^\[[^]]+\]: /{flag=0} flag' CHANGELOG.md > /tmp/notes.md
          [ -s /tmp/notes.md ] || { echo "::error::CHANGELOG.md 缺少 [$TAG_VER] 版本段落，先写 changelog 再发版"; exit 1; }

      - name: 发布 Release（附 zip）
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/polyask-*.zip
          body_path: /tmp/notes.md
